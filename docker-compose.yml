services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw_gateway
    ports:
      - "18789:18789"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
    volumes:
      - ./openclaw-data:/home/node/.openclaw
    restart: always

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: openclaw_ui
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - OPENCLAW_GATEWAY_URL=ws://openclaw:18789
      - OPENCLAW_IDENTITY_PATH=/app/openclaw/identity/device.json
    volumes:
      - ./openclaw-data:/app/openclaw
    depends_on:
      openclaw:
        condition: service_healthy
